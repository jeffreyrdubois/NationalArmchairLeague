version: "3.8"

services:
  nal:
    build: .
    container_name: nal
    restart: unless-stopped
    ports:
      - "8000:8000"         # Change left side if port 8000 is taken on your Unraid host
    volumes:
      - ./data:/app/data    # SQLite database persists here
    environment:
      # Loaded from .env file — never hardcode secrets here
      - SECRET_KEY
      - ODDS_API_KEY

      # Set to "false" once everyone has registered to prevent new signups
      - REGISTRATION_OPEN

      # Database path (leave as-is when using the volume mount above)
      - DATABASE_URL=sqlite:////app/data/nal.db

    # For SWAG reverse proxy integration:
    # Make sure nal is on the same Docker network as SWAG
    # networks:
    #   - swag_default
    # Then in SWAG's nginx/proxy-confs/ create nal.subdomain.conf:
    #   proxy_pass http://nal:8000;

# networks:
#   swag_default:
#     external: true
