## SWAG reverse proxy config for National Armchair League
## Place this file in: /path/to/swag/config/nginx/proxy-confs/nal.subdomain.conf
## Then access at: https://nal.yourdomain.com
##
## Make sure the 'nal' container is on the same Docker network as SWAG.
## In docker-compose.yml, uncomment the networks section and set swag_default.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name nal.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 10M;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app nal;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # WebSocket support (for HTMX SSE if added later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
