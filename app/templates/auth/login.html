{% extends "base.html" %}
{% block title %}Login &mdash; NAL{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white shadow rounded-xl p-8">
    <h1 class="text-2xl font-bold text-center mb-6">Welcome Back</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input name="username" type="text" required autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <button type="submit"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold py-2 rounded-lg transition">
        Sign In
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account? <a href="/register" class="text-yellow-600 font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
