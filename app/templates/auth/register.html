{% extends "base.html" %}
{% block title %}Register &mdash; NAL{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white shadow rounded-xl p-8">
    <h1 class="text-2xl font-bold text-center mb-6">Create Account</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username <span class="text-gray-400">(used to log in)</span></label>
        <input name="username" type="text" required autocomplete="username" minlength="3" maxlength="50"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name <span class="text-gray-400">(shown to others)</span></label>
        <input name="display_name" type="text" required maxlength="100"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input name="email" type="email" required autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required autocomplete="new-password" minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input name="password2" type="password" required autocomplete="new-password" minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>
      <button type="submit"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold py-2 rounded-lg transition">
        Create Account
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account? <a href="/login" class="text-yellow-600 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
